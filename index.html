<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
      overflow: hidden;
    }

    .display .expression {
      color: #a8b2c8;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .display .current {
      color: #e2e8f0;
      font-size: 40px;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    /* ── Candy Button base ── */
    button {
      position: relative;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      height: 64px;
      border-radius: 14px;
      cursor: pointer;
      outline: none;
      transition: filter 0.2s ease-out, transform 0.1s ease-out;
      overflow: hidden;
    }

    /* top-shine pseudo-element (the "candy highlight") */
    button::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 20%;
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.55), transparent);
      pointer-events: none;
    }

    button:hover  { filter: brightness(1.12); }
    button:active { transform: scale(0.95) rotate(0.5deg); filter: brightness(1.2); }

    /* Number buttons — blue candy */
    .btn-num {
      border: 1px solid #54A1FD;
      background: radial-gradient(95% 60% at 50% 75%, #005FD6 0%, #209BFF 100%);
      box-shadow: 0px 4px 40px -12px #1187FF, inset 0px 1px 8px -4px #fff;
    }

    /* Operator buttons — cyan candy */
    .btn-op {
      border: 1px solid #22d3ee;
      background: radial-gradient(95% 60% at 50% 75%, #0369a1 0%, #06b6d4 100%);
      box-shadow: 0px 4px 40px -12px #06b6d4, inset 0px 1px 8px -4px #fff;
    }

    /* Clear button — purple candy */
    .btn-clear {
      border: 1px solid #a78bfa;
      background: radial-gradient(95% 60% at 50% 75%, #5b21b6 0%, #8b5cf6 100%);
      box-shadow: 0px 4px 40px -12px #7c3aed, inset 0px 1px 8px -4px #fff;
    }

    /* Sign / percent buttons — slate candy */
    .btn-sign {
      border: 1px solid #94a3b8;
      background: radial-gradient(95% 60% at 50% 75%, #334155 0%, #64748b 100%);
      box-shadow: 0px 4px 40px -12px #475569, inset 0px 1px 8px -4px #fff;
    }

    /* Equals button — rose/pink candy */
    .btn-eq {
      border: 1px solid #fb7185;
      background: radial-gradient(95% 60% at 50% 75%, #9f1239 0%, #f43f5e 100%);
      box-shadow: 0px 4px 40px -12px #e11d48, inset 0px 1px 8px -4px #fff;
    }

    /* Zero spans 2 columns */
    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator" role="main" aria-label="Calculator">
    <div class="display">
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="current" id="current" aria-live="assertive">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()" aria-label="Clear all">AC</button>
      <button class="btn-sign" onclick="toggleSign()" aria-label="Toggle sign">+/−</button>
      <button class="btn-sign" onclick="percent()" aria-label="Percent">%</button>
      <button class="btn-op"   onclick="setOp('/')" aria-label="Divide">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op"  onclick="setOp('*')" aria-label="Multiply">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op"  onclick="setOp('-')" aria-label="Subtract">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op"  onclick="setOp('+')" aria-label="Add">+</button>

      <!-- Row 5 -->
      <button class="btn-num span-2" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq"  onclick="calculate()" aria-label="Equals">=</button>
    </div>
  </div>

  <script>
    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let shouldResetCurrent = false;
    let expressionStr = '';

    const currentEl    = document.getElementById('current');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      // Trim long numbers to fit
      let display = currentValue;
      if (display.length > 10) {
        const num = parseFloat(display);
        display = isNaN(num) ? 'Error' : parseFloat(num.toPrecision(9)).toString();
      }
      currentEl.textContent = display;
      expressionEl.textContent = expressionStr;
    }

    function input(digit) {
      if (shouldResetCurrent) {
        currentValue = digit;
        shouldResetCurrent = false;
      } else {
        if (currentValue === '0' && digit !== '.') {
          currentValue = digit;
        } else if (currentValue.length < 12) {
          currentValue += digit;
        }
      }
      updateDisplay();
    }

    function inputDot() {
      if (shouldResetCurrent) {
        currentValue = '0.';
        shouldResetCurrent = false;
      } else if (!currentValue.includes('.')) {
        currentValue += '.';
      }
      updateDisplay();
    }

    function setOp(op) {
      if (operator && !shouldResetCurrent) {
        calculate(true);
      }
      previousValue = currentValue;
      operator = op;
      shouldResetCurrent = true;

      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      expressionStr = `${previousValue} ${opSymbols[op]}`;
      updateDisplay();
    }

    function calculate(chaining = false) {
      if (!operator || previousValue === '') return;

      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      let result;

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/':
          if (curr === 0) { currentValue = 'Error'; operator = null; expressionStr = ''; updateDisplay(); return; }
          result = prev / curr;
          break;
        default: return;
      }

      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      if (!chaining) {
        expressionStr = `${previousValue} ${opSymbols[operator]} ${currentValue} =`;
      }

      currentValue = parseFloat(result.toPrecision(12)).toString();
      operator = chaining ? operator : null;
      previousValue = '';
      shouldResetCurrent = true;
      updateDisplay();
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      shouldResetCurrent = false;
      expressionStr = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentValue === '0' || currentValue === 'Error') return;
      currentValue = currentValue.startsWith('-')
        ? currentValue.slice(1)
        : '-' + currentValue;
      updateDisplay();
    }

    function percent() {
      const num = parseFloat(currentValue);
      if (isNaN(num)) return;
      currentValue = (num / 100).toString();
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') {
        if (currentValue.length > 1) currentValue = currentValue.slice(0, -1);
        else currentValue = '0';
        updateDisplay();
      }
      else if (e.key === 'Escape') clearAll();
      else if (e.key === '%') percent();
    });

    updateDisplay();
  </script>
</body>
</html>
